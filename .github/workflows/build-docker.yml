# build-docker.yml — Build and push the battle runner Docker image to GHCR.
name: Build Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: actions-rumble

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Robocode
        run: ./gradlew build -x test

      - name: Install Robocode headless
        run: |
          mkdir -p robocode-home
          cd robocode-home
          java -jar $GITHUB_WORKSPACE/build/robocode-*-setup.jar -q
          ls -la libs/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.battle
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/battle-runner:latest
            ghcr.io/${{ github.repository }}/battle-runner:${{ github.sha }}
