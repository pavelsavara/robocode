# build-docker.yml — Build and push the battle runner Docker image to GHCR.
name: Build Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: actions-rumble

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            8
            21

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Robocode
        run: ./gradlew build -x test

      - name: Extract Robocode from setup JAR
        run: |
          mkdir -p robocode-home
          cd robocode-home
          unzip -o $GITHUB_WORKSPACE/build/robocode-*-setup.jar \
            libs/* robots/* compilers/* battles/* robocode.bat robocode.sh \
            -x 'net/*' 'META-INF/*'
          ls -la libs/

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.battle
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/battle-runner:latest

      - name: Make package public
        run: |
          gh api --method PUT \
            /user/packages/container/robocode%2Fbattle-runner/visibility \
            -f visibility=public || echo "Could not set visibility (may need manual config)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
